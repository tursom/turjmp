app:
  name: Turjmp
  environment: dev
http:
  addr: ":8080"
  shutdown_timeout_seconds: 30
database:
  driver: sqlite
  dsn: "file:turjmp.dev.db?_pragma=busy_timeout(5000)&_pragma=journal_mode(WAL)&_pragma=foreign_keys(ON)"
  migrations_dir: migrations/sqlite
security:
  encryption_key: "dev-only-change-me-32-byte-secret"
  password_min_length: 8
jwt:
  private_key_path: ".turjmp/jwt_private.pem"
  public_key_path: ".turjmp/jwt_public.pem"
  access_ttl_seconds: 900
  refresh_ttl_seconds: 604800
proxy_auth:
  secret: "dev-proxy-secret"
  allowed_ips:
    - "127.0.0.1"
    - "::1"
# 代理配置：SSH 代理服务器监听地址与连接参数
proxy:
  # API 基础地址，SSH 代理通过此地址回调认证和 Token 验证接口
  api_base_url: "http://127.0.0.1:8080"
  ssh:
    # SSH 代理监听地址
    addr: ":2222"
    # 最大并发连接数，超出后拒绝新连接
    max_connections: 100
    # 空闲超时秒数（15 分钟），客户端无操作自动断开
    idle_timeout_seconds: 900
    # 连接目标主机超时秒数（15 秒）
    connect_timeout_seconds: 15
  db:
    # MySQL 原生代理监听地址
    mysql_addr: ":3307"
    # PostgreSQL 原生代理本阶段暂不启动，仅保留配置
    postgres_addr: ":5437"
    # 最大并发数据库代理连接数
    max_connections: 50
    # 空闲超时秒数（30 分钟）
    idle_timeout_seconds: 1800
    # 连接真实数据库超时秒数（15 秒）
    connect_timeout_seconds: 15
    # Web DB 终端使用的 usql 可执行文件
    usql_path: "usql"
totp:
  issuer: "Turjmp"
logging:
  level: debug
  encoding: console
rate_limit:
  enabled: true
  requests_per_second: 20
