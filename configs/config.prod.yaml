app:
  name: Turjmp
  environment: prod
http:
  addr: ":8080"
  shutdown_timeout_seconds: 30
database:
  driver: postgres
  dsn: "postgres://turjmp:changeme@postgres:5432/turjmp?sslmode=disable"
  migrations_dir: migrations/postgres
security:
  encryption_key: "replace-with-base64-or-32-byte-secret"
  password_min_length: 12
jwt:
  private_key_path: "/keys/jwt_private.pem"
  public_key_path: "/keys/jwt_public.pem"
  access_ttl_seconds: 900
  refresh_ttl_seconds: 604800
proxy_auth:
  secret: "replace-with-strong-shared-secret"
  allowed_ips:
    - "127.0.0.1"
# 代理配置：SSH 代理服务器监听地址与连接参数
proxy:
  # API 基础地址，SSH 代理通过此地址回调认证和 Token 验证接口
  api_base_url: "http://127.0.0.1:8080"
  ssh:
    # SSH 代理监听地址
    addr: ":2222"
    # 最大并发连接数，超出后拒绝新连接
    max_connections: 100
    # 空闲超时秒数（15 分钟），客户端无操作自动断开
    idle_timeout_seconds: 900
    # 连接目标主机超时秒数（15 秒）
    connect_timeout_seconds: 15
  db:
    # MySQL 原生代理监听地址
    mysql_addr: ":3307"
    # PostgreSQL 原生代理本阶段暂不启动，仅保留配置
    postgres_addr: ":5437"
    # 最大并发数据库代理连接数
    max_connections: 50
    # 空闲超时秒数（30 分钟）
    idle_timeout_seconds: 1800
    # 连接真实数据库超时秒数（15 秒）
    connect_timeout_seconds: 15
    # Web DB 终端使用的 usql 可执行文件
    usql_path: "usql"
  rdp:
    # RDP WebSocket 代理监听地址，前端连接 /ws/rdp/?token=...
    addr: ":33891"
    # guacd sidecar TCP 地址
    guacd_addr: "guacd:4822"
    # guacd 屏幕录制暂存目录，需与 guacd 容器共享挂载
    recording_path: "/recordings/rdp-tmp"
    # 最大并发 RDP 会话数
    max_connections: 20
    # 空闲超时秒数（60 分钟）
    idle_timeout_seconds: 3600
    # 连接 guacd 超时秒数（15 秒）
    connect_timeout_seconds: 15
totp:
  issuer: "Turjmp"
logging:
  level: info
  encoding: json
rate_limit:
  enabled: true
  requests_per_second: 50
